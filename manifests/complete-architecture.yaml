#test trigger
---
# 1. OPENTELEMETRY COLLECTOR (Gateway Pattern)
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-conf
data:
  config.yaml: |-
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        send_batch_size: 100
        timeout: 5s
    exporters:
      googlecloud:
        project: "platypus-lab01"
        log: 
          default_log_name: "opentelemetry-app-logs" 
      debug:
        verbosity: detailed
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [googlecloud, debug]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [googlecloud, debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:latest
        command: ["/otelcol-contrib", "--config=/etc/otelcol/config.yaml"]
        volumeMounts:
        - name: config-volume
          mountPath: /etc/otelcol
        ports:
        - containerPort: 4317 # GRPC
        - containerPort: 4318 # HTTP
      volumes:
      - name: config-volume
        configMap:
          name: otel-collector-conf
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
  - name: grpc
    port: 4317
    targetPort: 4317
  - name: http
    port: 4318
    targetPort: 4318

---
# 2. SERVICE B (Backend)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-b
spec:
  selector:
    matchLabels:
      app: service-b
  template:
    metadata:
      labels:
        app: service-b
    spec:
      containers:
      - name: service-b
        image: asia-east1-docker.pkg.dev/platypus-lab01/otel-repo/simple-febedb-app:3
        command: ["opentelemetry-instrument", "python", "service_b.py"]
        env:
        - name: OTEL_TRACES_EXPORTER
          value: "otlp"
        - name: OTEL_LOGS_EXPORTER
          value: "otlp"
        - name: OTEL_METRICS_EXPORTER
          value: "none"
        - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
          value: "true"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector:4317" 
        - name: OTEL_SERVICE_NAME
          value: "service-b-gke"
        ports:
        - containerPort: 5002
---
apiVersion: v1
kind: Service
metadata:
  name: service-b
spec:
  selector:
    app: service-b
  ports:
  - port: 5002
    targetPort: 5002

---
# 3. SERVICE A (Frontend)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a
spec:
  selector:
    matchLabels:
      app: service-a
  template:
    metadata:
      labels:
        app: service-a
    spec:
      containers:
      - name: service-a
        image: asia-east1-docker.pkg.dev/platypus-lab01/otel-repo/simple-febedb-app:3
        command: ["opentelemetry-instrument", "python", "service_a.py"]
        env:
        - name: OTEL_TRACES_EXPORTER
          value: "otlp"
        - name: OTEL_LOGS_EXPORTER
          value: "otlp"
        - name: OTEL_METRICS_EXPORTER
          value: "none"
        - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
          value: "true"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector:4317" 
        - name: OTEL_SERVICE_NAME
          value: "service-a-gke"
        ports:
        - containerPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: service-a-lb
spec:
  type: NodePort
  selector:
    app: service-a
  ports:
  - port: 80
    targetPort: 5001


---
# Service A (Frontend) Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service-a
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        # This tells the OpenTelemetry Operator to inject the Collector Sidecar!
        sidecar.opentelemetry.io/inject: "true" 
    spec:
      containers:
      - name: frontend-app
        # This is the exact image you just built in Jenkins!
        image: asia-east1-docker.pkg.dev/platypus-lab01/otel-repo/simple-febedb-app:3
        # Since both apps share the same Dockerfile, we override the command here
        command: ["opentelemetry-instrument", "python", "service_a.py"]
        ports:
        - containerPort: 5001
        env:
        # Point the Python auto-instrumentation to the injected sidecar
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://localhost:4317"
        - name: OTEL_SERVICE_NAME
          value: "frontend-service-a"

---
# Service A (Frontend) Service
apiVersion: v1
kind: Service
metadata:
  name: frontend-service-a
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001

---
# Service B (Backend) Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-service-b
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        # Inject the OTel sidecar here too
        sidecar.opentelemetry.io/inject: "true"
    spec:
      containers:
      - name: backend-app
        image: asia-east1-docker.pkg.dev/platypus-lab01/otel-repo/simple-febedb-app:3
        # Start Service B
        command: ["opentelemetry-instrument", "python", "service_b.py"]
        ports:
        - containerPort: 5002
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://localhost:4317"
        - name: OTEL_SERVICE_NAME
          value: "backend-service-b"

---
# Service B (Backend) Service
apiVersion: v1
kind: Service
metadata:
  name: service-b  # Named exactly what Service A looks for in its requests.get()
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 5002
      targetPort: 5002

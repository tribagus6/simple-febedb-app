apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-b
spec:
  selector:
    matchLabels:
      app: service-b
  template:
    metadata:
      labels:
        app: service-b
    spec:
      volumes:
      - name: otel-agent-volume
        emptyDir: {}
      initContainers:
      - name: otel-agent-attach
        image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-python:latest 
        command: ["cp", "-a", "/autoinstrumentation/.", "/otel-share/"]
        volumeMounts:
        - name: otel-agent-volume
          mountPath: /otel-share
      containers:
      - name: service-b
        image: asia-east1-docker.pkg.dev/platypus-lab01/otel-repo/simple-febedb-app:22
        command: ["/bin/sh", "-c"]
        args:
          - |
            export PYTHONPATH=$PYTHONPATH:/otel-share;
            export PATH=$PATH:/otel-share/bin;
            opentelemetry-instrument python service_b.py
        env:
        - name: OTEL_TRACES_EXPORTER
          value: "otlp_proto_http"
        - name: OTEL_LOGS_EXPORTER
          value: "otlp_proto_http"
        - name: OTEL_METRICS_EXPORTER
          value: "otlp_proto_http"
        - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
          value: "true"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "http/protobuf"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector:4318"
        - name: OTEL_SERVICE_NAME
          value: "service-b-backend"
        volumeMounts:
        - name: otel-agent-volume
          mountPath: /otel-share
        ports:
        - containerPort: 5002
---
apiVersion: v1
kind: Service
metadata:
  name: service-b
spec:
  selector:
    app: service-b
  ports:
  - port: 5002
    targetPort: 5002
